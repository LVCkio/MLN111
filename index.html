    <!-- Google Fonts: Literata (1 font duy nhất cho sách) -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Montserrat:wght@500;600;700;800;900&family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- SPA redirect decode for GitHub Pages 404 workaround -->
    <script>
      (function(l){
        if(l.search[1]==='p'){
          var decoded=l.search.slice(1).split('&').map(function(v){return v.replace(/~and~/g,'&')});
          window.history.replaceState(null,null,
            l.pathname.slice(0,-1)+decoded[0].slice(2)+
            (decoded[1]?'?'+decoded[1]:'')+l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
